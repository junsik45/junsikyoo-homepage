title: "Jun-Sik Yoo"
baseURL: "https://junsikyoo.pages.dev/"

defaultContentLanguage: en
hasCJKLanguage: false
enableRobotsTXT: true
enableGitInfo: false

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: github
    lineNos: false
    codeFences: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

imaging:
  resampleFilter: lanczos
  quality: 85
  anchor: smart

taxonomies:
  tag: tags
  category: categories
  publication_type: publication_types
  author: authors
